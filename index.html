<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أكاديمية مربح الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body { background: #f8fafc; padding-bottom: 50px; }

        /* شاشة الترحيب */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0F2D52 0%, #1a4a82 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; transition: opacity 0.8s ease; }
        .enter-btn { background: #C9A227; color: #0F2D52; padding: 15px 40px; font-size: 1.5rem; font-weight: 800; border: none; border-radius: 50px; cursor: pointer; }

        /* الهيدر */
        .header-section { background: white; padding: 20px 5%; border-bottom: 3px solid #C9A227; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: auto; }
        .logo { width: 110px; height: auto; object-fit: contain; }
        .title-area { text-align: center; flex: 1; }
        .main-title { font-size: 24px; font-weight: 900; color: #0F2D52; }
        .sub-title { font-size: 14px; color: #b45309; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .schedule-img { width: 100%; max-width: 500px; display: block; margin: 20px auto; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 10px rgba(0,0,0,0.05); text-align: center; }
        .btn { background: #0F2D52; color: white; padding: 10px; border-radius: 8px; text-decoration: none; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div style="text-align: center;">
            <h1>أهلاً بكِ في أكاديمية مربح</h1>
            <button class="enter-btn" onclick="enterPlatform()">دخول المنصة</button>
        </div>
    </div>

    <header class="header-section">
        <div class="header-content">
            <img src="moe.png.jfif" class="logo" alt="وزارة">
            <div class="title-area">
                <h1 class="main-title">أكاديمية مربح الرقمية</h1>
                <p class="sub-title">نحو القمة 🚀</p>
            </div>
            <img src="school_new.png" class="logo" alt="مدرسة مربح">
        </div>
    </header>

    <div class="container">
        <img src="schedule.jpg" class="schedule-img">
        <div class="grid">
            <div class="card"><h3>الخامس</h3><a href="grade5.html" class="btn">دخول</a></div>
            <div class="card"><h3>السادس</h3><a href="grade6.html" class="btn">دخول</a></div>
            <div class="card"><h3>السابع</h3><a href="grade7.html" class="btn">دخول</a></div>
            <div class="card"><h3>الثامن</h3><a href="grade8.html" class="btn">دخول</a></div>
        </div>
    </div>

    <script>
        function enterPlatform() {
            const screen = document.getElementById('welcome-screen');
            screen.style.opacity = '0';
            setTimeout(() => { screen.style.display = 'none'; }, 800);
        }
    </script>
</body>
</html>
