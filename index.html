<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية مربح الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body { background: #f8fafc; padding-bottom: 50px; }

        /* الهيدر */
        .header-section { background: white; padding: 20px 5%; border-bottom: 3px solid #C9A227; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: auto; }
        .logo { width: 100px; height: auto; }
        .title-area { text-align: center; flex: 1; }
        .main-title { font-size: 24px; font-weight: 900; color: #0F2D52; }
        
        /* الحاوية الرئيسية */
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .schedule-img { width: 100%; max-width: 500px; display: block; margin: 20px auto; border-radius: 12px; }
        
        /* هذا الجزء هو المسؤول عن الترتيب الذكي */
        .grid { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 15px; 
        }
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-align: center;
            width: 200px; /* حجم ثابت للبطاقة يضمن ظهورهم بجانب بعض */
        }
        .btn { background: #0F2D52; color: white; padding: 8px 20px; border-radius: 8px; text-decoration: none; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <header class="header-section">
        <div class="header-content">
            <img src="moe.png.jfif" class="logo" alt="وزارة">
            <div class="title-area">
                <h1 class="main-title">أكاديمية مربح الرقمية</h1>
            </div>
            <img src="school_new.png" class="logo" alt="مدرسة">
        </div>
    </header>

    <div class="container">
        <img src="schedule.jpg" class="schedule-img">
        <div class="grid">
            <div class="card"><h3>الصف الخامس</h3><a href="grade5.html" class="btn">دخول</a></div>
            <div class="card"><h3>الصف السادس</h3><a href="grade6.html" class="btn">دخول</a></div>
            <div class="card"><h3>الصف السابع</h3><a href="grade7.html" class="btn">دخول</a></div>
            <div class="card"><h3>الصف الثامن</h3><a href="grade8.html" class="btn">دخول</a></div>
        </div>
    </div>

</body>
</html>
