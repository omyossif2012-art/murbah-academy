<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أكاديمية مربح الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body { background: #f8fafc; padding-bottom: 50px; }

        /* الهيدر */
        .header-section { background: white; padding: 20px 5%; border-bottom: 3px solid #C9A227; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: auto; }
        .logo { width: 110px; height: auto; }
        .title-area { text-align: center; }
        .main-title { font-size: 28px; font-weight: 900; color: #0F2D52; }
        .sub-title { font-size: 16px; font-weight: 700; color: #b45309; }

        /* الترتيب (عرضي وليس طولي) */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; text-align: center; }
        .schedule-img { width: 100%; max-width: 500px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            margin-top: 30px; 
        }
        .card { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); text-align: center; }
        .btn { background: #1e293b; color: white; padding: 10px 25px; border-radius: 10px; text-decoration: none; font-weight: 700; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <header class="header-section">
        <div class="header-content">
            <img src="moe.png.jfif" class="logo" alt="وزارة التربية">
            <div class="title-area">
                <h1 class="main-title">أكاديمية مربح الرقمية</h1>
                <p class="sub-title">مدرسة مربح للتعليم الأساسي ح2 بنات — نحو القمة 🚀</p>
            </div>
            <img src="school_new.png" class="logo" alt="مدرسة مربح">
        </div>
    </header>

    <div class="container">
        <section>
            <h2 style="font-size: 22px; margin-bottom: 15px;">📅 جدول الاختبارات النهائية</h2>
            <img src="schedule.jpg" class="schedule-img">
        </section>

        <div class="grid">
            <div class="card"><h3>الصف الخامس</h3><a href="grade5.html" class="btn">دخول</a></div>
            <div class="card"><h3>الصف السادس</h3><a href="grade6.html" class="btn">دخول</a></div>
            <div class="card"><h3>الصف السابع</h3><a href="grade7.html" class="btn">دخول</a></div>
            <div class="card"><h3>الصف الثامن</h3><a href="grade8.html" class="btn">دخول</a></div>
        </div>
    </div>

</body>
</html>
